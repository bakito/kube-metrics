apiVersion: v1
kind: Pod
metadata:
  name: two-container-memory-demo
  namespace: default
spec:
  restartPolicy: Always
  containers:
    - name: default
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "Default container running"
          while true; do
            sleep 3600
          done

    - name: memory-load
      image: python:3.12-alpine
      command:
        - sh
        - -c
        - |
          python - <<'PY'
          import time
          import random
          import hashlib

          print("Starting dynamic memory and CPU load pattern", flush=True)
          
          # Run memory allocation and bounded CPU load cycles
          for cycle in range(10):
              # Randomly allocate between 30 MiB and 90 MiB
              allocation_size = random.randint(30, 90)
              data = bytearray(allocation_size * 1024 * 1024)
          
              # Touch memory pages so the allocation is actually committed.
              for i in range(0, len(data), 4096):
                  data[i] = 1
          
              print(f"Cycle {cycle + 1}: Allocated ~{allocation_size} MiB and generating CPU load for 10 seconds", flush=True)
              end = time.time() + 10
              payload = b"kube-metrics-cpu-load"
              while time.time() < end:
                  payload = hashlib.sha256(payload).digest()
          
              # Release memory by deleting the data
              del data
              print(f"Cycle {cycle + 1}: Released memory, sleeping for 5 seconds", flush=True)
              time.sleep(5)

          print("Done with memory and CPU load; keeping container running", flush=True)
          while True:
              time.sleep(3600)
          PY
      resources:
        requests:
          memory: "50Mi"
          cpu: "100m"
        limits:
          memory: "100Mi"
          cpu: "500m"